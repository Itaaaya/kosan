<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register - Kost Yu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="kostyu.css">
</head>
<body>

    <div class="login-page-wrapper">
        <div class="login-container">
            
            <!-- ================= FORM LOGIN ================= -->
            <div id="box-login">
                <h2>Masuk Akun</h2>
                <!-- 1. ID Form disamakan menjadi loginForm -->
                <form id="loginForm">
                    <div class="input-group">
                        <input type="text" id="username" placeholder="Username" required>
                    </div>
                    <div class="input-group">
                        <!-- 2. Tambahkan id="password" di bawah ini -->
                        <input type="password" id="password" placeholder="Password" required>
                    </div>
                    
                    <!-- 3. Ganti type menjadi submit agar fungsi fetch berjalan otomatis -->
                    <button type="submit" class="btn-login-submit">Login</button>
                </form>

                <div class="switch-text">
                    Belum punya akun? <a href="javascript:void(0);" onclick="tampilkanDaftar()">Daftar Sekarang</a>
                </div>
            </div>

            <!-- ================= FORM DAFTAR ================= -->
            <div id="box-daftar" style="display: none;">
                <h2>Daftar Akun</h2>
                <form>
                    <div class="input-group">
                        <input type="text" placeholder="Nama Lengkap" required>
                    </div>
                    <div class="input-group">
                        <input type="text" placeholder="Username Baru" required>
                    </div>
                    <div class="input-group">
                        <input type="password" placeholder="Buat Password" required>
                    </div>
                    
                    <button type="button" class="btn-login-submit" onclick="alert('Pendaftaran berhasil! Silakan masuk menggunakan akun baru Anda.')">Daftar</button>
                </form>

                <div class="switch-text">
                    Sudah punya akun? <a href="javascript:void(0);" onclick="tampilkanLogin()">Login di sini</a>
                </div>
            </div>

        </div>
    </div>

    <!-- SCRIPT PENGATUR LOGIKA & TOMBOL -->
<script>
        const loginForm = document.getElementById('loginForm');

        if (loginForm) {
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault(); // Mencegah halaman reload otomatis

                const usernameInput = document.getElementById('username').value;
                const passwordInput = document.getElementById('password').value;

                try {
                    // Kirim data login ke API Server Node.js kita
                    const response = await fetch('/api/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            username: usernameInput,
                            password: passwordInput
                        })
                    });

                    const data = await response.json();

                    // === JIKA BERHASIL (KODE INI YANG SEMPAT HILANG) ===
                    if (data.success) {
                        alert('🎉 ' + data.message);
                        
                        // Pengecekan Role & Pengalihan Halaman
                        if (data.user.role === 'admin') {
                            window.location.href = '/dashboard-admin.html'; 
                        } else if (data.user.role === 'penghuni') {
                            window.location.href = '/dashboard-penghuni.html'; 
                        } else {
                            window.location.href = '/index.html'; 
                        }
                    } else {
                        // Jika password atau username salah di database
                        alert('❌ ' + data.message);
                    }

                } catch (error) {
                    console.error('Error:', error);
                    alert('Terjadi kesalahan pada sistem server.');
                }
            });
        }

        // Script untuk memunculkan form Daftar dan menyembunyikan form Login
        function tampilkanDaftar() {
            document.getElementById("box-login").style.display = "none";
            document.getElementById("box-daftar").style.display = "block";
        }

        // Script untuk memunculkan form Login dan menyembunyikan form Daftar
        function tampilkanLogin() {
            document.getElementById("box-daftar").style.display = "none";
            document.getElementById("box-login").style.display = "block";
        }
    </script>

</body>
</html>
