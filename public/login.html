<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register - Kost Yu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="kostyu.css">
</head>
<body>

    <div class="login-page-wrapper">
        <div class="login-container">
            
            <div id="box-login">
                <h2>Masuk Akun</h2>
                <form id="loginForm">
                    <div class="input-group">
                        <input type="text" id="username" placeholder="Username" required>
                    </div>
                    <div class="input-group">
                        <input type="password" id="password" placeholder="Password" required>
                    </div>
                    
                    <button type="submit" class="btn-login-submit">Login</button>
                </form>

                <div class="switch-text">
                    Belum punya akun? <a href="javascript:void(0);" onclick="tampilkanDaftar()">Daftar Sekarang</a>
                </div>
            </div>

            <div id="box-daftar" style="display: none;">
                <h2>Daftar Akun</h2>
                <form id="daftarForm">
                    <div class="input-group">
                        <input type="text" id="regNama" placeholder="Nama Lengkap" required>
                    </div>
                    <div class="input-group">
                        <input type="text" id="regUsername" placeholder="Username Baru" required>
                    </div>
                    <div class="input-group">
                        <input type="password" id="regPassword" placeholder="Buat Password" required>
                    </div>
                    
                    <button type="submit" class="btn-login-submit">Daftar</button>
                </form>

                <div class="switch-text">
                    Sudah punya akun? <a href="javascript:void(0);" onclick="tampilkanLogin()">Login di sini</a>
                </div>
            </div>

        </div>
    </div>

    <div id="popup" class="popup" style="display: none;">
        <div class="popup-content">
            <span id="popup-message"></span>
            <br><br>
            <button onclick="tutupPopup()">OK</button>
        </div>
    </div>

    <script>
        // ==========================================
        // LOGIKA LOGIN (SUDAH DI-FIX KE DASHBOARD PENGHUNI)
        // ==========================================
        const loginForm = document.getElementById('loginForm');

        if (loginForm) {
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault(); 

                const usernameInput = document.getElementById('username').value;
                const passwordInput = document.getElementById('password').value;

                try {
                    const response = await fetch('/api/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: usernameInput, password: passwordInput })
                    });

                    const data = await response.json();

                    if (data.success) {
                        // 1. Simpan data session ke memori browser
                        localStorage.setItem('isLoggedIn', 'true');
                        localStorage.setItem('userNama', data.user.nama);
                        localStorage.setItem('userRole', data.user.role);
                        localStorage.setItem('user', JSON.stringify(data.user)); 

                        // 2. 🔥 GERBANG REDIRECT SUDAH DIARAHKAN KE FILE YANG BENAR
                        if (data.user.role === 'admin') {
                            window.redirectUrl = 'dashboard-admin.html';
                        } else if (data.user.role === 'penghuni') {
                            window.redirectUrl = 'dashboard-penghuni.html'; // <-- Diubah ke file dashboard asli kamu!
                        } else {
                            // JIKA USER BIASA: Cek apakah ada catatan halaman tempat dia berasal tadi?
                            const halamanTerakhir = localStorage.getItem('halamanTerakhir');

                            if (halamanTerakhir && !halamanTerakhir.includes('login.html')) {
                                localStorage.removeItem('halamanTerakhir'); 
                                window.redirectUrl = halamanTerakhir;       
                            } else {
                                window.redirectUrl = 'index.html';          
                            }
                        }

                        tampilkanPopup(data.message);
                    } else {
                        window.redirectUrl = null; 
                        tampilkanPopup(data.message);
                    }

                } catch (error) {
                    console.error('Error:', error);
                    window.redirectUrl = null;
                    tampilkanPopup('Terjadi kesalahan pada sistem server.');
                }
            });
        }

        // ==========================================
        // LOGIKA REGISTER
        // ==========================================
        const daftarForm = document.getElementById('daftarForm');
        if (daftarForm) {
            daftarForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                const nama = document.getElementById('regNama').value;
                const username = document.getElementById('regUsername').value;
                const password = document.getElementById('regPassword').value;

                try {
                    const response = await fetch('/api/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ nama_lengkap: nama, username: username, password: password })
                    });

                    const data = await response.json();

                    if (data.success) {
                        window.redirectUrl = null; 
                        tampilkanPopup("Berhasil mendaftar! Silakan login menggunakan akun baru Anda.");
                        tampilkanLogin(); 
                    } else {
                        window.redirectUrl = null;
                        tampilkanPopup(data.message);
                    }
                } catch (error) {
                    console.error('Error:', error);
                    window.redirectUrl = null;
                    tampilkanPopup('Terjadi kesalahan pada server saat mendaftar.');
                }
            });
        }

        // ==========================================
        // FUNGSI TAMPILAN & POPUP
        // ==========================================
        function tampilkanDaftar() {
            document.getElementById("box-login").style.display = "none";
            document.getElementById("box-daftar").style.display = "block";
        }

        function tampilkanLogin() {
            document.getElementById("box-daftar").style.display = "none";
            document.getElementById("box-login").style.display = "block";
        }

        function tampilkanPopup(pesan) {
            document.getElementById("popup-message").textContent = pesan;
            document.getElementById("popup").style.display = "flex";
        }

        function tutupPopup() {
            document.getElementById("popup").style.display = "none";
            if (window.redirectUrl) {
                window.location.href = window.redirectUrl;
            }
        }
    </script>
</body>
</html>
