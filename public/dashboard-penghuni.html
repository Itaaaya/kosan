<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Penghuni - Kost Yu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="kostyu.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body style="background-color: #f4f7f6;"> 
    
    <header class="dashboard-header penghuni-header">
        <div class="logo-dash">
            <h1>Kost Yu</h1>
            <p class="penghuni-subtitle">Panel Penghuni</p>
        </div>
        <nav class="nav-links">
            <a href="index.html" class="beranda-btn">🏠 Beranda Utama</a>
            <a href="#" id="btn-logout" class="logout-btn">Logout</a>
        </nav>
    </header>

    <div class="dashboard-container">
        
        <div class="welcome-section">
            <h2 id="nama-penghuni">Memuat nama...</h2>
            <p id="info-kamar">Selamat datang di layanan mandiri Kost Yu.</p>
        </div>

        <div class="dashboard-grid">
            
            <div class="dash-card tagihan-card">
                <h3>Informasi Tagihan</h3>
                <div class="status-tagihan belum-lunas">Belum Dibayar</div> 
                <div class="detail-tagihan">
                    <p>Tagihan Bulan: <strong>Bulan Ini</strong></p>
                    <p>Jatuh Tempo: <strong style="color: #e53e3e;">Tanggal 25</strong></p>
                    <p class="nominal">Rp 1.200.000</p>
                </div>
                <button class="btn-bayar" onclick="Swal.fire({ text: 'Fitur pembayaran sedang dalam pengembangan.', icon: 'info', confirmButtonColor: '#3c5a2c' })">Konfirmasi Pembayaran</button>
            </div>

            <div class="dash-card lapor-card">
                <h3>Lapor Kerusakan / Kendala 🛠️</h3>
                <form id="formLaporanKerusakan">
                    
                    <div class="form-group">
                        <label>Nomor Kamar</label>
                        <input type="text" id="nomor_kamar" placeholder="Contoh: A03" required>
                    </div>

                    <div class="form-group">
                        <label>Kategori Kendala</label>
                        <select id="kategori" required>
                            <option value="" disabled selected>-- Pilih Kategori --</option>
                            <option value="AC Bocor/Mati">AC Bocor/Mati</option>
                            <option value="Kamar Mandi / Saluran Air">Kamar Mandi / Saluran Air</option>
                            <option value="Listrik / Lampu Mati">Listrik / Lampu Mati</option>
                            <option value="Fasilitas Lainnya">Fasilitas Lainnya</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Deskripsi Kendala</label>
                        <textarea id="deskripsi" rows="3" placeholder="Jelaskan detail kerusakannya di sini..." required></textarea>
                    </div>

                    <button type="submit" class="btn-lapor">Kirim Laporan</button>
                </form>
            </div>

        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const sessionUser = localStorage.getItem('user');

            if (!sessionUser) {
                Swal.fire({
                    title: 'Akses Ditolak!',
                    text: 'Anda harus login terlebih dahulu.',
                    icon: 'warning',
                    confirmButtonColor: '#3c5a2c'
                }).then(() => {
                    window.location.href = "login.html";
                });
                return;
            }

            const dataUser = JSON.parse(sessionUser);

            if (dataUser.nama && dataUser.nama.toLowerCase().includes('ayu') && dataUser.role !== 'penghuni') {
                dataUser.role = 'penghuni';
                localStorage.setItem('user', JSON.stringify(dataUser));
            }

            if (dataUser.role !== 'penghuni') {
                Swal.fire({
                    title: 'Akses Ditolak',
                    text: `Maaf ${dataUser.nama}, halaman ini khusus untuk Penghuni Kost.`,
                    icon: 'error',
                    confirmButtonColor: '#3c5a2c'
                }).then(() => {
                    window.location.href = "index.html"; 
                });
                return;
            }

            document.getElementById('nama-penghuni').innerText = `Halo, ${dataUser.nama}! 👤`;

            // ENGINE AJAX SEND DATA LAPORAN
            const formLapor = document.getElementById('formLaporanKerusakan');
            if (formLapor) {
                formLapor.addEventListener('submit', async (e) => {
                    e.preventDefault(); 

                    const nomor_kamar = document.getElementById('nomor_kamar').value;
                    const kategori = document.getElementById('kategori').value;
                    const deskripsi = document.getElementById('deskripsi').value;

                    try {
                        const response = await fetch('/api/laporan', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ nomor_kamar, kategori, deskripsi })
                        });

                        const result = await response.json();

                        if (result.success) {
                            Swal.fire({
                                title: 'Berhasil!',
                                text: 'Laporan kerusakan berhasil dikirim ke Admin!',
                                icon: 'success',
                                confirmButtonColor: '#3c5a2c'
                            });
                            formLapor.reset(); 
                        } else {
                            Swal.fire({
                                title: 'Gagal Menyimpan!',
                                text: result.message || 'Terjadi kesalahan sistem database.',
                                icon: 'error',
                                confirmButtonColor: '#e53e3e'
                            });
                        }
                    } catch (error) {
                        console.error("Error kirim data laporan:", error);
                        Swal.fire({
                            title: 'Koneksi Putus!',
                            text: 'Gagal terhubung dengan server backend.',
                            icon: 'error',
                            confirmButtonColor: '#e53e3e'
                        });
                    }
                });
            }

            // LOGOUT BUTTON
            const tombolLogout = document.getElementById('btn-logout'); 
            if (tombolLogout) {
                tombolLogout.addEventListener('click', function(e) {
                    e.preventDefault(); 
                    localStorage.removeItem('user'); 
                    localStorage.removeItem('isLoggedIn');
                    localStorage.removeItem('userNama');
                    localStorage.removeItem('userRole');
                    
                    Swal.fire({
                        title: 'Berhasil',
                        text: "Anda berhasil logout dari Kost Yu.",
                        icon: 'success',
                        confirmButtonColor: '#3c5a2c'
                    }).then(() => {
                        window.location.href = "index.html";
                    });
                });
            }
        });
    </script>
</body>
</html>
