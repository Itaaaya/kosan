<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Pemesanan - Kost Yu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="kostyu.css">
</head>
<body style="background-color: #f5edd3; padding: 40px 20px;">

    <div class="booking-wrapper">
        <h2>Formulir Pemesanan Kamar</h2>
        <p class="booking-subtitle">Silakan isi data diri Anda dengan lengkap dan benar.</p>

        <form action="/api/booking" method="POST" enctype="multipart/form-data">
            
            <div class="form-section-title">Informasi Kamar</div>
            <div class="form-row">
                
                <div class="form-group">
                    <label>Pilih Tipe Kamar</label>
                    <select name="tipe_kamar" id="tipe_kamar" required>
                        <option value="" disabled selected>-- Pilih Tipe --</option>
                        <option value="Tipe A">Tipe A</option>
                        <option value="Tipe B">Tipe B</option>
                        <option value="Tipe C">Tipe C</option>
                        <option value="Tipe D">Tipe D</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Pilih Nomor Kamar</label>
                    <select name="nomor_kamar" id="nomor_kamar" required>
                        <option value="" disabled selected>-- Pilih Nomor --</option>
                        </select>
                </div>
                
            </div>

            <div class="form-section-title">Data Diri Pengunjung</div>
            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" name="nama_lengkap" placeholder="Masukkan nama sesuai KTP" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Nomor Telepon / WhatsApp</label>
                    <input type="tel" name="nomor_wa" placeholder="Contoh: 0895..." required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="Contoh: nama@gmail.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>Alamat Lengkap Asal</label>
                <textarea name="alamat_asal" placeholder="Masukkan alamat lengkap asal rumah Anda" rows="3" required></textarea>
            </div>

            <div class="form-section-title">Kontak Darurat (Keluarga/Kerabat)</div>
            <div class="form-row">
                <div class="form-group">
                    <label>Nama Kontak Darurat</label>
                    <input type="text" name="nama_darurat" placeholder="Nama orang tua / wali" required>
                </div>
                <div class="form-group">
                    <label>Nomor Telepon Darurat</label>
                    <input type="tel" name="nomor_darurat" placeholder="Nomor telepon aktif" required>
                </div>
            </div>



            <div class="form-section-title">Metode Pembayaran DP / Sewa</div>
            <div class="form-group">
                <label>Pilih Metode</label>
                <select name="metode_pembayaran" required>
                    <option value="" disabled selected>-- Pilih Metode Pembayaran --</option>
                    <option value="Transfer BCA">Transfer Bank BCA</option>
                    <option value="Transfer Mandiri">Transfer Bank Mandiri</option>
                    <option value="E-Wallet">E-Wallet (GoPay / OVO / Dana)</option>
                </select>
            </div>

            <button type="submit" class="btn-submit-booking">Kirim Formulir Pemesanan</button>
        </form>
    </div>

<script>
    const selectTipe = document.getElementById('tipe_kamar');
    const selectNomor = document.getElementById('nomor_kamar');

    // Otomatis tarik nomor kamar yang berstatus 'Kosong' dari database saat tipe dipilih
    selectTipe.addEventListener('change', async () => {
        const tipeDipilih = selectTipe.value.replace('Tipe ', '');
        selectNomor.innerHTML = '<option value="" disabled selected>-- Memuat Nomor Kamar... --</option>';

        try {
            const respon = await fetch(`/api/kamar/detail/${tipeDipilih}`);
            const daftarKamar = await respon.json();

            selectNomor.innerHTML = '<option value="" disabled selected>-- Pilih Nomor --</option>';
            
            // Masukkan kamar-kamar yang statusnya kosong ke dalam dropdown
            daftarKamar.forEach(kamar => {
                if (kamar.status === 'Kosong') {
                    selectNomor.innerHTML += `<option value="${kamar.nomor_kamar}">${kamar.nomor_kamar} (Tersedia)</option>`;
                } else {
                    selectNomor.innerHTML += `<option value="${kamar.nomor_kamar}" disabled>${kamar.nomor_kamar} (Penuh)</option>`;
                }
            });
        } catch (error) {
            selectNomor.innerHTML = '<option value="" disabled>Gagal memuat data kamar</option>';
        }
    });
</script>
</body>
</html>
